<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Earth</title>
    <!-- daisy ui + tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1
      class="text-3xl border-b-2 border-gray-200 bg-gray-50 text-center font-black text-green-500 py-2 sticky top-0 z-10"
    >
      Choose Your Trees
    </h1>
    <main class="container mx-auto mb-20">
      <section class="grid grid-cols-5 gap-7 items-start">
        <!-- categories -->
        <!-- categories btn  -->
        <div
          id="categories"
          class="col-span-1 shadow-sm p-5 rounded-lg sticky top-2"
        >
          <h2 class="text-4xl font-bold text-center mb-4">Categories</h2>
          <div id="all-btn-container" class="space-y-3">
            <button id="all-trees" class="btn btn-primary w-full">
              All Trees
            </button>
          </div>
        </div>
        <!-- card -->
        <div class="col-span-3 shadow-sm p-5 rounded-lg">
          <!-- container -->
          <div
            id="trees-card-container"
            class="grid grid-cols-3 gap-5 items-start"
          ></div>
          <!-- loading spinner -->
          <div id="loading-spinner" class="hidden text-center h-30">
            <div class="mt-20 h-9">
              <span class="loading loading-dots loading-xs"></span>
              <span class="loading loading-dots loading-sm"></span>
              <span class="loading loading-dots loading-md"></span>
              <span class="loading loading-dots loading-lg"></span>
              <span class="loading loading-dots loading-xl"></span>
            </div>
          </div>
        </div>
        <!-- cart  -->
        <div class="col-span-1 shadow-lg p-1 rounded-lg sticky top-15">
          <h2 class="text-2xl font-black mb-3.5">Your Cart</h2>
          <!-- card -->
          <div id="cart"></div>
          <!-- default text  -->
          <div
            id="default"
            class=" text-red-400 font-medium text-center bg-gray-100 rounded-sm py-7 text-xl"
          >
            <p>Your cart is empty</p>
            <p>Add trees to get started</p>
          </div>

          <div class="bg-green-50 my-5 flex justify-between p-3 rounded-sm">
            <span>Total:</span>
            <span id="total-price">$0</span>
          </div>
        </div>
      </section>
    </main>
    <!-- Open the modal using ID.showModal() method -->
    <dialog id="my_modal" class="modal shadow-2xl">
      <div class="modal-box bg-black text-white">
        <div id="modal-container" class="space-y-2 rounded-2xl"></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-error">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
