<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Earth</title>
    <!-- daisy ui + tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 class="text-5xl text-center font-black text-green-500 my-7">
      Choose Your Trees
    </h1>
    <main class="container mx-auto mb-10">
      <section class="grid grid-cols-5 gap-7">
        <!-- categories -->
        <!-- categories btn  -->
        <div id="categories" class="col-span-1 shadow-sm p-5 rounded-lg">
          <h2 class="text-4xl font-bold text-center mb-4">Categories</h2>
          <div id="all-btn-container" class="space-y-3">
            <div>
              <button class="btn btn-success w-full">All Trees</button>
            </div>
          </div>
        </div>
        <!-- card -->
        <div id="trees-card" class="col-span-3 grid grid-cols-3 gap-5 items-start shadow-sm p-5 rounded-lg">
          <div class="card bg-base-100 shadow-lg rounded-lg">
            <figure>
              <img
                src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp"
                alt="Shoes"
              />
            </figure>
            <div class="card-body">
              <h2 class="card-title">Card Title</h2>
              <p class="line-clamp-2">
                A card component has a figure, a body part, and inside body
                there are title and actions parts
              </p>
              <div class="badge badge-outline badge-success">Fruit Tree</div>
              <div class="card-actions justify-between items-center">
                <h3 class="text-3xl font-bold text-green-500">$500</h3>
                <button class="btn btn-success">Cart</button>
              </div>
            </div>
          </div>


        </div>
        <!-- cart  -->
        <div id="cart" class=" col-span-1 shadow-xl p-5 rounded-sm">cart</div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
