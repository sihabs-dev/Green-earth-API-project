<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Earth</title>
    <!-- daisy ui + tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 class="text-5xl text-center font-black text-green-500 my-7">
      Choose Your Trees
    </h1>
    <main class="container mx-auto mb-10">
      <section class="grid grid-cols-5 gap-7 items-start">
        <!-- categories -->
        <!-- categories btn  -->
        <div id="categories" class="col-span-1 shadow-sm p-5 rounded-lg">
          <h2 class="text-4xl font-bold text-center mb-4">Categories</h2>
          <div id="all-btn-container" class="space-y-3">
            
              <button id="all-trees" class="btn btn-primary w-full">All Trees</button>
            
          </div>
        </div>
        <!-- card -->
        <div class="col-span-3 shadow-sm p-5 rounded-lg">
          <!-- container -->
          <div
            id="trees-card-container"
            class="grid grid-cols-3 gap-5 items-start"
          ></div>
          <!-- loading spinner -->
          <div id="loading-spinner" class="hidden text-center h-30">
            <div class="mt-20 h-9">
              <span class="loading loading-dots loading-xs"></span>
              <span class="loading loading-dots loading-sm"></span>
              <span class="loading loading-dots loading-md"></span>
              <span class="loading loading-dots loading-lg"></span>
              <span class="loading loading-dots loading-xl"></span>
            </div>
          </div>
        </div>
        <!-- cart  -->
        <div id="cart" class="col-span-1 shadow-sm p-5 rounded-lg">cart</div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
